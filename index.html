                    <header className="p-6 bg-slate-900 border-b border-slate-800 flex justify-between items-center z-50">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-amber-500 rounded-2xl shadow-lg shadow-amber-500/20"><Icon name="clock" size={24} className="text-slate-950"/></div>
                            <div><h1 className="font-black text-2xl uppercase tracking-tighter leading-none text-white">The Remnant Study</h1><span className="text-[10px] font-black text-slate-500 uppercase mt-1 block">{version}</span></div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setViewMode('share')} className={`p-2.5 rounded-xl transition-all ${viewMode === 'share' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400'}`}><Icon name="share-2" size={20}/></button>
                            <button onClick={() => setViewMode('about')} className={`p-2.5 rounded-xl transition-all ${viewMode === 'about' ? 'bg-amber-500 text-slate-950 shadow-lg' : 'bg-slate-800 text-slate-400'}`}><Icon name="info" size={20}/></button>
                        </div>
                    </header>

                    <div className="flex-1 relative overflow-hidden bg-gradient-to-b from-slate-950 to-slate-900">
                        {viewMode === 'timeline' && renderTimeline()}
                        {viewMode === 'about' && renderAbout()}
                        {viewMode === 'share' && renderShare()}
                        {viewMode === 'messages' && renderMessages()}
                        {viewMode === 'sanctuary' && (
                            <div className="h-full p-8 max-w-7xl mx-auto overflow-y-auto custom-scrollbar animate-in fade-in pb-32 text-center text-slate-500 font-black uppercase flex flex-col justify-center items-center opacity-30"><Icon name="calendar" size={64} className="mb-4" /> Sabbath Hub Active</div>
                        )}
                        {viewMode === 'decoder' && (
                            <div className="h-full p-8 max-w-7xl mx-auto overflow-y-auto custom-scrollbar animate-in fade-in pb-32 text-center text-slate-500 font-black uppercase flex flex-col justify-center items-center opacity-30"><Icon name="shield-check" size={64} className="mb-4" /> Symbols Decoder Active</div>
                        )}
                    </div>

                    <nav className="p-5 bg-slate-900 border-t border-slate-800 flex justify-around items-center z-50">
                        {[
                            { id: 'timeline', label: 'Timeline', icon: 'layout' },
                            { id: 'sanctuary', label: 'Sabbath', icon: 'calendar' },
                            { id: 'decoder', label: 'Symbols', icon: 'shield-check' },
                            { id: 'messages', label: 'Messages', icon: 'three-angels' }
                        ].map(n => {
                            const isActive = viewMode === n.id;
                            return (
                                <button key={n.id} onClick={() => setViewMode(n.id)} className={`flex flex-col items-center gap-1.5 transition-all ${isActive ? 'text-amber-500 scale-110' : 'text-slate-500'}`}>
                                    {n.icon === 'three-angels' ? <ThreeAngelsIcon size={26} /> : <Icon name={n.icon} size={26} />}
                                    <span className="text-[9px] font-black uppercase tracking-widest">{n.label}</span>
                                </button>
                            );
                        })}
                    </nav>

                    {selectedEvent && (
                        <div className="fixed inset-0 bg-black/98 z-[100] flex items-center justify-center p-4 backdrop-blur-xl">
                            <div className="bg-slate-900 border border-amber-500/30 rounded-[3rem] w-full max-w-xl p-10 overflow-hidden shadow-2xl relative">
                                <button onClick={() => setSelectedEvent(null)} className="absolute top-8 right-8 p-3 bg-slate-800 hover:bg-red-500/20 rounded-full transition-colors"><Icon name="x" size={32}/></button>
                                <div className="mb-10">
                                    <h2 className="text-4xl font-black uppercase text-white leading-none mb-2">{selectedEvent.title}</h2>
                                    <p className="text-amber-500 font-black uppercase text-[10px] tracking-[0.3em]">{selectedEvent.label || 'Prophetic Insight'}</p>
                                </div>
                                <div className="space-y-10">
                                    <p className="text-slate-100 text-xl leading-relaxed font-medium border-l-4 border-amber-500 pl-8">{selectedEvent.description}</p>
                                    <div className="bg-slate-800/40 p-10 rounded-[2.5rem] border border-slate-700 italic text-slate-300 text-lg relative">
                                        <div className="absolute -top-4 left-8 bg-slate-900 px-3 py-1 rounded-full border border-slate-700 text-[10px] font-black text-blue-400 uppercase">Spirit of Prophecy</div>
                                        "{selectedEvent.spiritOfProphecy}"
                                    </div>
                                    <div className="flex gap-4">
                                        <a href={getBibleLink(selectedEvent.bible || "Revelation")} target="_blank" className="flex-1 text-center py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2">Bible Study <Icon name="external-link" /></a>
                                        {selectedEvent.egwLink && <a href={selectedEvent.egwLink} target="_blank" className="flex-1 text-center py-4 bg-amber-500 text-slate-950 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2">Context Study <Icon name="external-link" /></a>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
