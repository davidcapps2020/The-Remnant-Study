                        <button onClick={() => setSelectedEvent({ title: "The Seal of God", label: "Identity", bible: "Ezekiel 20:12", description: "The Sabbath is the specific sign between God and His people, containing His Name, Title, and Territory.", spiritOfProphecy: "The sign, or seal, of God is revealed in the observance of the seventh-day Sabbath. - TM 446", egwLink: getEGWLink(132, 1960) })} className="bg-slate-900 p-8 rounded-[3rem] border border-slate-800 shadow-2xl hover:border-blue-500 transition-all text-left"><div className="flex items-center gap-4 mb-6"><div className="p-4 bg-blue-600/10 rounded-2xl text-blue-500"><Icon name="shield-check" size={32} /></div><h3 className="text-xl font-black text-white uppercase">The Seal</h3></div><p className="text-slate-400 text-sm leading-relaxed mb-8">The mark of loyalty to the true Living God.</p><div className="flex items-center text-blue-400 font-black text-xs uppercase tracking-widest">Study <Icon name="chevron-right" className="ml-2"/></div></button>
                        <button onClick={() => setSelectedEvent({ title: "The Final Test", label: "Conflict", bible: "Revelation 14:12", description: "In the closing scenes, the Sabbath will be the point upon which the great final test of loyalty turns.", spiritOfProphecy: "The Sabbath will be the great test of loyalty... When the final test shall be brought to bear upon men, then the line of distinction will be drawn. - GC 605", egwLink: getEGWLink(132, 2727) })} className="bg-slate-900 p-8 rounded-[3rem] border border-slate-800 shadow-2xl hover:border-red-500 transition-all text-left"><div className="flex items-center gap-4 mb-6"><div className="p-4 bg-red-600/10 rounded-2xl text-red-500"><Icon name="gavel" size={32} /></div><h3 className="text-xl font-black text-white uppercase">Final Test</h3></div><p className="text-slate-400 text-sm leading-relaxed mb-8">The deciding point in the closing scenes of history.</p><div className="flex items-center text-red-500 font-black text-xs uppercase tracking-widest">Study <Icon name="chevron-right" className="ml-2"/></div></button>
                    </div>
                    <div className="space-y-6">
                        <div className="flex items-center gap-4 mb-8"><Icon name="library" size={24} className="text-blue-400"/><h3 className="text-2xl font-black text-white uppercase tracking-widest">EGW Study Resources</h3><div className="h-px flex-1 bg-slate-800"></div></div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {[
                                { title: "PP: Creation", book: "84", segment: "117", desc: "Chapter 2: The institution of the Sabbath in Eden." },
                                { title: "GC: God's Law Immutable", book: "132", segment: "1960", desc: "Chapter 25: The specific link to God's Law." },
                                { title: "GC: The Final Warning", book: "132", segment: "2727", desc: "Chapter 38: The Loud Cry and the last message." }
                            ].map((res, i) => (
                                <a key={i} href={getEGWLink(res.book, res.segment)} target="_blank" className="bg-slate-900/50 border border-slate-800 p-6 rounded-2xl hover:bg-slate-800 hover:border-blue-500/50 transition-all flex flex-col justify-between group shadow-xl">
                                    <div><h4 className="font-black text-white text-sm group-hover:text-blue-400 transition-colors uppercase mb-2">{res.title}</h4><p className="text-slate-500 text-xs leading-relaxed italic mb-4">{res.desc}</p></div>
                                    <div className="flex items-center gap-2 text-[10px] font-black text-blue-400 uppercase tracking-widest">EGW Mobile <Icon name="external-link" size={12}/></div>
                                </a>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderDecoder = () => (
                <div className="h-full p-8 max-w-7xl mx-auto overflow-y-auto custom-scrollbar animate-in fade-in pb-32">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-slate-800 pb-8 gap-6"><div><h2 className="text-5xl font-black text-white uppercase tracking-tighter leading-none mb-2">Decoder</h2><p className="text-slate-500 text-xs font-black uppercase tracking-[0.4em] italic">Full Catalog Prophetic Keys</p></div><div className="relative w-full max-w-xs"><input type="text" placeholder="Search 85+ symbols..." className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-xs focus:border-amber-500 outline-none transition-all pl-12 text-white" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} /><div className="absolute left-4 top-4 text-slate-600"><Icon name="search" size={18}/></div></div></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">{filteredSymbols.map((s, idx) => (<div key={idx} className="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] hover:border-amber-500 transition-all flex flex-col justify-between group"><div><div className="flex justify-between items-start mb-4"><h3 className="text-xl font-black text-white uppercase tracking-tight group-hover:text-amber-400">{s.symbol}</h3><span className="text-[8px] font-black uppercase bg-slate-800 border px-2 py-1 rounded-full text-slate-500">{s.cat}</span></div><p className="text-slate-400 text-sm leading-relaxed mb-6 italic border-l-2 border-slate-800 pl-4">{s.meaning}</p></div><div className="flex items-center gap-2 text-[10px] font-black text-blue-400 uppercase tracking-widest"><Icon name="book-open" size={14}/> Key: {s.bible}</div></div>))}</div>
                </div>
            );

            const renderAbout = () => (
                <div className="h-full p-8 max-w-4xl mx-auto overflow-y-auto custom-scrollbar text-center pb-32">
                    <div className="p-4 bg-amber-500/10 border border-amber-500/30 rounded-full inline-block mb-6"><Icon name="scroll" size={48} className="text-amber-500"/></div>
                    <h2 className="text-5xl font-black text-white uppercase mb-4">About The Remnant Study</h2>
                    <p className="text-slate-400 text-lg uppercase font-black italic mb-12">A Roadmap for the Final Days</p>
                    <div className="bg-slate-900 border border-slate-800 p-10 rounded-[3rem] shadow-2xl flex flex-col md:flex-row items-center gap-10 mb-12 text-left">
                        <div className="bg-white p-4 rounded-3xl shadow-xl">
                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(OFFICIAL_URL)}`} className="w-40 h-40" alt="QR" />
                        </div>
                        <div className="flex-1">
                            <h3 className="text-3xl font-black text-white uppercase mb-3 text-white">Share the Mission</h3>
                            <p className="text-slate-400 text-sm mb-6 italic">Scan this code to quickly open this study tool on any mobile device. This is a visual roadmap intended for the proclamation of truth in the final days.</p>
                            <a href={OFFICIAL_URL} target="_blank" className="inline-flex items-center gap-2 text-blue-400 font-black uppercase text-xs hover:underline">Official Site <Icon name="external-link" /></a>
                        </div>
                    </div>
                    <section className="bg-rose-950/20 border border-rose-900/30 p-10 rounded-[4rem] text-center shadow-2xl"><div className="text-rose-500 mb-6 flex justify-center"><Icon name="heart" size={48} /></div><h3 className="text-3xl font-black text-white uppercase mb-4">Support the Mission</h3><p className="text-slate-300 text-sm mb-10">Your support helps keep this tool active and free for world outreach.</p><a href="https://square.link/u/OOXgkZZs" target="_blank" className="inline-block py-6 px-12 bg-[#008CFF] hover:bg-[#0074D4] text-white rounded-[2rem] font-black uppercase tracking-widest shadow-xl transition-all active:scale-95">Support via Square</a></section>
                </div>
            );

            const renderShare = () => (
                <div className="h-full p-8 max-w-4xl mx-auto flex flex-col items-center justify-center text-center pb-32">
                    <div className="text-blue-500 mb-8"><Icon name="share-2" size={64} /></div>
                    <h2 className="text-5xl font-black text-white uppercase mb-6">Share the Warning</h2>
                    <p className="text-slate-300 text-xl italic mb-12 max-w-2xl">"Proclaim the message of the soon-coming Saviour to every nation, kindred, tongue, and people."</p>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-2xl mb-12">
                        <button onClick={() => window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(OFFICIAL_URL)}`)} className="bg-slate-900 border border-slate-800 p-8 rounded-3xl flex flex-col items-center gap-3 transition-all hover:bg-slate-800 active:scale-95"><Icon name="facebook" size={32} className="text-blue-600"/><span className="text-[10px] font-black uppercase text-slate-500">Facebook</span></button>
                        <button onClick={() => window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(OFFICIAL_URL)}`)} className="bg-slate-900 border border-slate-800 p-8 rounded-3xl flex flex-col items-center gap-3 transition-all hover:bg-slate-800 active:scale-95"><Icon name="twitter" size={32} className="text-blue-400"/><span className="text-[10px] font-black uppercase text-slate-500">Twitter (X)</span></button>
                        <button onClick={() => window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText + " " + OFFICIAL_URL)}`)} className="bg-slate-900 border border-slate-800 p-8 rounded-3xl flex flex-col items-center gap-3 transition-all hover:bg-slate-800 active:scale-95"><Icon name="message-square" size={32} className="text-green-500"/><span className="text-[10px] font-black uppercase text-slate-500">WhatsApp</span></button>
                        <button onClick={() => window.open(`mailto:?subject=Prophetic Study Resource&body=${encodeURIComponent(shareText + " " + OFFICIAL_URL)}`)} className="bg-slate-900 border border-slate-800 p-8 rounded-3xl flex flex-col items-center gap-3 transition-all hover:bg-slate-800 active:scale-95"><Icon name="mail" size={32} className="text-amber-500"/><span className="text-[10px] font-black uppercase text-slate-500">Email</span></button>
                    </div>
                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] w-full max-w-lg">
                        <h3 className="text-white font-black uppercase text-xs tracking-widest mb-4">Copy Direct Link</h3>
                        <div className="flex gap-2">
                            <div className="flex-1 bg-slate-950 border border-slate-800 p-4 rounded-xl text-slate-500 text-xs truncate text-left overflow-hidden">{OFFICIAL_URL}</div>
                            <button onClick={copyToClipboard} className="bg-blue-600 p-4 rounded-xl text-white active:scale-95 transition-all">{showCopyFeedback ? <Icon name="shield-check" /> : <Icon name="link" />}</button>
                        </div>
                    </div>
                </div>
            );

            const renderMessages = () => (
                <div className="h-full p-8 max-w-7xl mx-auto overflow-y-auto custom-scrollbar pb-32 animate-in fade-in">
                    <div className="flex justify-between items-end mb-12 border-b border-blue-900/30 pb-6"><div><h2 className="text-4xl font-black text-white uppercase tracking-tighter flex items-center gap-4"><ThreeAngelsIcon className="text-blue-400" size={40} /> The Three Angels' Messages</h2><p className="text-slate-500 text-xs font-black uppercase tracking-[0.3em] mt-1 italic">God's Final Call to Humanity</p></div></div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {angelMessages.map(am => (<button key={am.id} onClick={() => setSelectedEvent({...am, title: am.name, description: am.desc, spiritOfProphecy: am.egw, egwLink: am.link})} className="bg-slate-900 p-8 rounded-[3rem] border border-slate-800 shadow-2xl hover:border-blue-500 transition-all text-left group">
                            <div className="flex items-center gap-4 mb-6">
                                <div className="p-4 bg-blue-600/10 rounded-2xl text-blue-400"><Icon name={am.id === 'am1' ? 'globe' : am.id === 'am2' ? 'skull' : 'alert-triangle'} size={32} /></div>
                                <h3 className="text-xl font-black text-white uppercase">{am.name}</h3>
                            </div>
                            <p className="text-slate-400 text-sm mb-8 leading-relaxed italic">{am.desc}</p>
                            <div className="flex items-center text-blue-400 font-black text-xs uppercase tracking-widest">Study Message <Icon name="chevron-right" className="ml-2"/></div>
                        </button>))}
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-screen bg-slate-950 text-slate-100 font-sans overflow-hidden">
                    <header className="p-6 bg-slate-900 border-b border-slate-800 flex justify-between items-center z-50">
                        <div className="flex items-center gap-4"><div className="p-3 bg-amber-500 rounded-2xl shadow-lg shadow-amber-500/20"><Icon name="clock" size={24} className="text-slate-950"/></div><div><h1 className="font-black text-2xl uppercase tracking-tighter leading-none text-white">The Remnant Study</h1><span className="text-[10px] font-black text-slate-500 uppercase mt-1 block">{version}</span></div></div>
                        <div className="flex items-center gap-2"><button onClick={() => setViewMode('share')} className={`p-2.5 rounded-xl transition-all ${viewMode === 'share' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400'}`}><Icon name="share-2" size={20}/></button><button onClick={() => setViewMode('about')} className={`p-2.5 rounded-xl transition-all ${viewMode === 'about' ? 'bg-amber-500 text-slate-950 shadow-lg' : 'bg-slate-800 text-slate-400'}`}><Icon name="info" size={20}/></button></div>
                    </header>
                    <div className="flex-1 relative overflow-hidden bg-gradient-to-b from-slate-950 to-slate-900">{viewMode === 'timeline' && renderTimeline()}{viewMode === 'sanctuary' && renderSabbath()}{viewMode === 'decoder' && renderDecoder()}{viewMode === 'about' && renderAbout()}{viewMode === 'share' && renderShare()}{viewMode === 'messages' && renderMessages()}</div>
                    <nav className="p-5 bg-slate-900 border-t border-slate-800 flex justify-around items-center z-50">{[{ id: 'timeline', label: 'Timeline', icon: 'layout' }, { id: 'sanctuary', label: 'Sabbath', icon: 'calendar' }, { id: 'decoder', label: 'Symbols', icon: 'shield-check' }, { id: 'messages', label: 'Messages', icon: 'three-angels' }].map(n => { const isActive = viewMode === n.id; return (<button key={n.id} onClick={() => setViewMode(n.id)} className={`flex flex-col items-center gap-1.5 transition-all active:scale-95 ${isActive ? 'text-amber-500 scale-110' : 'text-slate-500'}`}>{n.icon === 'three-angels' ? <ThreeAngelsIcon size={26} /> : <Icon name={n.icon} size={26} />}<span className="text-[9px] font-black uppercase tracking-widest">{n.label}</span></button>); })}</nav>
                    {selectedEvent && (<div className="fixed inset-0 bg-black/98 z-[100] flex items-center justify-center p-4 backdrop-blur-xl"><div className="bg-slate-900 border border-amber-500/30 rounded-[3rem] w-full max-w-xl p-10 overflow-hidden shadow-2xl relative"><button onClick={() => setSelectedEvent(null)} className="absolute top-8 right-8 p-3 bg-slate-800 hover:bg-red-500/20 rounded-full transition-colors"><Icon name="x" size={32}/></button><div className="mb-10"><h2 className="text-4xl font-black uppercase text-white leading-none mb-2">{selectedEvent.title}</h2><p className="text-amber-500 font-black uppercase text-[10px] tracking-[0.3em]">{selectedEvent.label || 'Prophetic Insight'}</p></div><div className="space-y-10"><p className="text-slate-100 text-xl leading-relaxed font-medium border-l-4 border-amber-500 pl-8">{selectedEvent.description}</p><div className="bg-slate-800/40 p-10 rounded-[2.5rem] border border-slate-700 italic text-slate-300 text-lg relative"><div className="absolute -top-4 left-8 bg-slate-900 px-3 py-1 rounded-full border border-slate-700 text-[10px] font-black text-blue-400 uppercase">Spirit of Prophecy</div>"{selectedEvent.spiritOfProphecy}"</div><div className="flex gap-4"><a href={getBibleLink(selectedEvent.bible || "Revelation")} target="_blank" className="flex-1 text-center py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2">Bible Study <Icon name="external-link" /></a>{selectedEvent.egwLink && <a href={selectedEvent.egwLink} target="_blank" className="flex-1 text-center py-4 bg-amber-500 text-slate-950 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2">Context Study <Icon name="external-link" /></a>}</div></div></div></div>)}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
